<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HPASim 泊车可视化</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <h1>HPASim 泊车可视化</h1>
      </div>

      <section class="panel" aria-live="polite">
        <div class="label">当前车位</div>
        <div class="value" id="hoverSlot">未选择</div>
        <div class="label" style="margin-top: 10px;">状态</div>
        <div class="value" id="planStatus">点击车位生成全局路径</div>
      </section>

      <section class="metric-grid">
        <div>
          <div class="label">车位数</div>
          <div class="value" id="spaceCount">-</div>
        </div>
        <div>
          <div class="label">全局路径点</div>
          <div class="value" id="pathCount">-</div>
        </div>
        <div>
          <div class="label">局部轨迹点</div>
          <div class="value" id="trajectoryCount">-</div>
        </div>
        <div>
          <div class="label">轨迹进度</div>
          <div class="value" id="progressStatus">-</div>
        </div>
      </section>

      <section class="panel">
        <div class="label">车辆微观行为</div>
        <div class="micro-grid">
          <div>
            <div class="label">档位</div>
            <div class="value" id="gearStatus">-</div>
          </div>
          <div>
            <div class="label">速度</div>
            <div class="value" id="speedStatus">-</div>
          </div>
          <div>
            <div class="label">前轮转角</div>
            <div class="value" id="steerStatus">-</div>
          </div>
          <div>
            <div class="label">加速度</div>
            <div class="value" id="accelStatus">-</div>
          </div>
          <div>
            <div class="label">航向角</div>
            <div class="value" id="yawStatus">-</div>
          </div>
          <div>
            <div class="label">曲率</div>
            <div class="value" id="curvatureStatus">-</div>
          </div>
          <div>
            <div class="label">里程</div>
            <div class="value" id="distanceStatus">-</div>
          </div>
          <div>
            <div class="label">时间</div>
            <div class="value" id="timeStatus">-</div>
          </div>
        </div>
      </section>

      <div class="button-row">
        <button id="startDrive" class="primary" type="button" disabled>开始行驶</button>
        <button id="pauseDrive" type="button" disabled>暂停</button>
      </div>
      <div class="button-row">
        <button id="resetDrive" type="button" disabled>重置车辆</button>
        <button id="resetView" type="button">重置视图</button>
      </div>

      <section class="legend" aria-label="legend">
        <div class="legend-row"><span class="swatch" style="background:#474a45"></span>行车通道</div>
        <div class="legend-row"><span class="swatch" style="background:#d7d2c5"></span>空车位</div>
        <div class="legend-row"><span class="swatch" style="background:#52b7d8"></span>选中车位</div>
        <div class="legend-row"><span class="swatch" style="background:#777b73"></span>车辆/障碍</div>
        <div class="legend-row"><span class="swatch" style="background:#f1c75d"></span>全局前进路径</div>
        <div class="legend-row"><span class="swatch" style="background:#de735e"></span>全局倒车段</div>
        <div class="legend-row"><span class="swatch" style="background:#6bd1ff"></span>局部轨迹窗口</div>
        <div class="legend-row"><span class="swatch" style="background:#f0f0ea"></span>已行驶轨迹/车辆</div>
      </section>
    </aside>

    <section class="canvas-wrap">
      <canvas id="mapCanvas"></canvas>
      <div class="toast" id="toast">黄色/红色为全局路径，蓝色为车辆前方局部轨迹窗口，白色为已行驶轨迹。</div>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
